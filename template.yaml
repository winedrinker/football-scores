AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Football Scores E2E - High Performance Pipeline

Parameters:
  Environment:
    Type: String
    Description: Deployment environment (e.g., dev, staging, prod)
    AllowedValues:
      - dev
      - staging
      - prod
    Default: dev

Globals:
  Function:
    Timeout: 5
    Runtime: python3.14
    Architectures:
      - x86_64
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON
  Api:
    TracingEnabled: false
Resources:
  # --- INFRASTRUCTURE (SQS) ---
  FootballScoreQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-FootballScores-${Environment}"
      VisibilityTimeout: 60
      ReceiveMessageWaitTimeSeconds: 10
      MessageRetentionPeriod: 345600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FootballScoreDLQ.Arn
        maxReceiveCount: 2
  FootballScoreDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-FootballScores-DLQ-${Environment}"
  FootballScoreQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref FootballScoreQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt ApiGatewaySqsRole.Arn
            Action: sqs:SendMessage
            Resource: !GetAtt FootballScoreQueue.Arn

  # --- SHARED LAYER ---
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-common-layer"
      CompatibleRuntimes:
        - python3.14
      ContentUri: src/layer/
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.14

  # --- PRODUCER (API -> SQS) ---
#  FootballScoresProducerFunction:
#    Type: AWS::Serverless::Function
#    Properties:
#      Handler: app.lambda_handler
#      CodeUri: src/producer/
#      Description: Football Scores Producer
#      MemorySize: 128
#      Layers:
#        - !Ref CommonLayer
#      Environment:
#        Variables:
#          LOG_LEVEL: INFO
#          SQS_QUEUE_URL: !Ref FootballScoreQueue
#      Tags:
#        LambdaPowertools: python
#      Policies:
#        - SQSSendMessagePolicy:
#            QueueName: !GetAtt FootballScoreQueue.QueueName
#      Events:
#        PostScoreApi:
#          Type: Api
#          Properties:
#            Path: /scores
#            Method: post
#
#  FootballScoresProducerLogsLogGroup:
#    Type: AWS::Logs::LogGroup
#    Properties:
#      LogGroupName: !Sub "/aws/lambda/${FootballScoresProducerFunction}"
#      RetentionInDays: 30

  KafkaForwarderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/forwarder/
      Handler: app.lambda_handler
      MemorySize: 1024
      Timeout: 10
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          CONFLUENT_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ConfluentCloudAuth"
          POWERTOOLS_SERVICE_NAME: football-forwarder
          POWERTOOLS_METRICS_NAMESPACE: FootballProject
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt FootballScoreQueue.QueueName
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ConfluentCloudAuth-*"
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt FootballScoreQueue.Arn
            BatchSize: 500
            FunctionResponseTypes:
              - ReportBatchItemFailures
            MaximumBatchingWindowInSeconds: 2
            ScalingConfig:
              MaximumConcurrency: 5
  FootballScoresApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      Name: !Sub "${AWS::StackName}-FootballScoresApi-${Environment}"
      Description: API for Football Scores Producer
      EndpointConfiguration: REGIONAL
      Cors:
        AllowMethods: "'POST'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      DefinitionBody:
        openapi: "3.0.1"
        info:
          title: Football Scores API
          version: "1.0"
        paths:
          /scores:
            post:
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: "#/components/schemas/ScoreModel"
                required: true
              responses:
                "202":
                  description: "202 response"
                  content: { }
              x-amazon-apigateway-request-validator: "Validate body"
              x-amazon-apigateway-integration:
                type: "aws"
                credentials: !GetAtt ApiGatewaySqsRole.Arn
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:sqs:path/${AWS::AccountId}/${FootballScoreQueue.QueueName}"
                httpMethod: "POST"
                responses:
                  default:
                    statusCode: "202"
                requestParameters:
                  integration.request.header.Content-Type: "'application/x-www-form-urlencoded'"
                requestTemplates:
                  application/json: "Action=SendMessage&MessageBody=$util.urlEncode($input.body)&Version=2012-11-05"
                passthroughBehavior: "when_no_templates"
        components:
          schemas:
            ScoreModel:
              title: "ScoreUpdate"
              required:
                - "matchId"
                - "score"
                - "teamAway"
                - "teamHome"
                - "timestamp"
              type: "object"
              properties:
                matchId:
                  type: "integer"
                teamHome:
                  type: "string"
                teamAway:
                  type: "string"
                score:
                  pattern: "^\\d+:\\d+$"
                  type: "string"
                timestamp:
                  type: "string"
                  format: "date-time"
        x-amazon-apigateway-security-policy: "TLS_1_0"
        x-amazon-apigateway-request-validators:
          Validate body:
            validateRequestParameters: false
            validateRequestBody: true
  ApiGatewaySqsRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: apigateway.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: ApiSqsPolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action: sqs:SendMessage
                  Resource: !GetAtt FootballScoreQueue.Arn
  PerformanceDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AWS::StackName}-Performance-${Environment}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/ApiGateway", "Count", "ApiName", "${AWS::StackName}-FootballScoresApi-${Environment}", "Stage", "${Environment}", { "stat": "Sum", "label": "API Requests" } ],
                  [ ".", "Latency", ".", ".", ".", ".", { "stat": "Average", "yAxis": "right" } ]
                ],
                "period": 60,
                "region": "${AWS::Region}",
                "title": "API Performance",
                "yAxis": { "left": { "label": "Count" }, "right": { "label": "ms" } }
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${FootballScoreQueue.QueueName}", { "stat": "Maximum" } ],
                  [ ".", "NumberOfMessagesSent", ".", ".", { "stat": "Sum" } ],
                  [ ".", "NumberOfMessagesDeleted", ".", ".", { "stat": "Sum" } ]
                ],
                "period": 60,
                "region": "${AWS::Region}",
                "title": "SQS Throughput"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "FootballProject", "MessagesProcessed", "service", "football-forwarder", { "stat": "Sum" } ],
                  [ ".", "BatchSize", ".", ".", { "stat": "Average" } ]
                ],
                "period": 60,
                "region": "${AWS::Region}",
                "title": "Kafka Forwarder Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${KafkaForwarderFunction}", { "stat": "Average" } ],
                  [ "...", { "stat": "p99" } ],
                  [ ".", "Errors", ".", ".", { "stat": "Sum", "yAxis": "right" } ],
                  [ ".", "Throttles", ".", ".", { "stat": "Sum", "yAxis": "right" } ]
                ],
                "period": 60,
                "region": "${AWS::Region}",
                "title": "Lambda Performance",
                "yAxis": { "left": { "label": "ms" }, "right": { "label": "Count" } }
              }
            }
          ]
        }

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-HighLatency-${Environment}"
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub "${AWS::StackName}-FootballScoresApi-${Environment}"

  QueueBacklogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-QueueBacklog-${Environment}"
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FootballScoreQueue.QueueName

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-LambdaErrors-${Environment}"
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref KafkaForwarderFunction

